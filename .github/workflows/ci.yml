name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9]

    services:
      # Start a blockchain node for testing
      blockchain:
        image: trufflesuite/ganache-cli:latest
        ports:
          - 8545:8545
        options: >-
          -d
          --chain.chainId 1337
          --wallet.totalAccounts 10
          --wallet.defaultBalance 1000

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install -r agent/requirements.txt
        pip install -r ai_engine/requirements.txt
        pip install pytest

    - name: Run unit tests
      run: |
        python -m pytest tests/test_unit.py -v

    - name: Run integration tests
      run: |
        python -m pytest tests/test_integration.py -v

    - name: Test Docker build
      run: |
        docker build -f backend/Dockerfile -t hacktrap-backend .
        docker build -f agent/Dockerfile -t hacktrap-agent .
        docker build -f ai_engine/Dockerfile -t hacktrap-ai-engine .

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Run security scan
      uses: actions/checkout@v3
      with:
        # Use a security scanning tool like bandit or safety
        # This is a placeholder for actual security scanning
        run: |
          pip install bandit
          bandit -r backend/ -f html -o security-report.html

    - name: Upload security report
      uses: actions/upload-artifact@v3
      with:
        name: security-report
        path: security-report.html
