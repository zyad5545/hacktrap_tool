services:
  cowrie:
    build: ./cowrie
    container_name: hacktrap_cowrie
    restart: unless-stopped
    ports:
      - "2222:2222"
      - "2323:2323"
    volumes:
      - ./cowrie-data:/home/cowrie/cowrie/var
    environment:
      - DEBIAN_FRONTEND=noninteractive

  ai_engine:
    build: ./ai_agent
    container_name: hacktrap_ai_engine
    restart: unless-stopped
    depends_on:
      - blockchain
    ports:
      - "5000:5000"
    volumes:
      - ./ai_agent:/app
      - ./ai_agent/ai_agent/data:/app/data
    environment:
      - MODEL_PATH=/app/data/attack_model.joblib
      - XSS_MODEL_PATH=/app/data/xss_model.joblib
      - DEBIAN_FRONTEND=noninteractive
    entrypoint: ["python", "app.py"]
    command: []

  backend:
    build: ./backend
    container_name: hacktrap_backend
    restart: unless-stopped
    depends_on:
      - ai_engine
      - blockchain
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ai_agent/ai_agent/data:/app/data
      - ./cowrie-data:/app/cowrie-data
    environment:
      - FORCE_AI_ONLY=0
      - PREFER_REMOTE_AI=0
      - DETECT_THRESHOLD=0.8
      - DB_PATH=/app/data/app.db
      - AI_ENDPOINT=http://hacktrap_ai_engine:5000/predict
      - BLOCKCHAIN_RPC=http://hacktrap_blockchain:8545
      - ANCHORING_ENABLED=true
      - HONEY_API_KEY=honeypot-secure-key
      - DEBIAN_FRONTEND=noninteractive
    command: gunicorn app:app -b 0.0.0.0:8000 --workers 1 --timeout 120 --log-level debug

  dashboard:
    build:
      context: ./dashboard
    container_name: hacktrap_dashboard
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5001:5000"
    environment:
      - BACKEND_URL=http://hacktrap_backend:8000
      - HONEY_API_KEY=honeypot-secure-key
      - DASH_POLL_INTERVAL=1.0
    volumes:
      - ./dashboard:/app

  nginx:
    image: nginx:alpine
    container_name: hacktrap_nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  cowrie_connector:
    build:
      context: ./backend
      dockerfile: Dockerfile.connector
    container_name: hacktrap_cowrie_connector
    restart: unless-stopped
    depends_on:
      - backend
      - cowrie
    volumes:
      - ./cowrie-data:/home/cowrie/cowrie/var:ro
      - ./backend/integrations/cowrie_connector.py:/app/cowrie_connector.py:ro
    environment:
      - API=http://hacktrap_backend:8000/api/honeypot/capture
      - HONEY_API_KEY=honeypot-secure-key
    command: ["python", "/app/cowrie_connector.py"]

  blockchain:
    image: trufflesuite/ganache-cli:latest
    container_name: hacktrap_blockchain
    restart: unless-stopped
    ports:
      - "8545:8545"
    command: >
      --chainId 1337
      --accounts 10
      --defaultBalanceEther 1000
      --deterministic
      --db /data
    volumes:
      - ./blockchain-data:/data
