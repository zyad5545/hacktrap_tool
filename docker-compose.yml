services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DB_PATH=./data/app.db
      - AI_ENDPOINT=http://ai_engine:5000/predict
    volumes:
      - ./data:/app/data
    depends_on:
      - ai_engine

  ai_engine:
    build: ./ai_engine
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data

  agent:
    build: ./agent
    volumes:
      - ./data:/app/data

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./dashboard:/usr/share/nginx/html
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  blockchain:
    image: trufflesuite/ganache-cli:latest
    ports:
      - "8545:8545"
    command: >
      --chain.chainId 1337
      --wallet.totalAccounts 10
      --wallet.defaultBalance 1000
      --deterministic