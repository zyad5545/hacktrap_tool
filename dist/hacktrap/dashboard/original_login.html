<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Original Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-card {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }
        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="login-card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">Original Login</h1>
            <p class="text-white opacity-80">Welcome back! Please sign in to continue.</p>
        </div>
        
        <form class="space-y-6" method="post" action="/login">
            <div>
                <label class="block text-white text-sm font-medium mb-2" for="email">Email</label>
                <div class="relative">
                    <i data-feather="mail" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-white opacity-70"></i>
                    <input id="email" name="email" type="email" class="input-field w-full pl-10 pr-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-white focus:ring-opacity-50" placeholder="your@email.com">
                </div>
            </div>
            
            <div>
                <label class="block text-white text-sm font-medium mb-2" for="password">Password</label>
                <div class="relative">
                    <i data-feather="lock" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-white opacity-70"></i>
                    <input id="password" name="password" type="password" class="input-field w-full pl-10 pr-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-white focus:ring-opacity-50" placeholder="••••••••">
                </div>
            </div>
            
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                    <label for="remember" class="ml-2 block text-sm text-white opacity-80">Remember me</label>
                </div>
                <a href="#" class="text-sm text-white font-medium hover:underline">Forgot password?</a>
            </div>
            
            <button type="submit" class="w-full bg-white text-indigo-600 py-3 px-4 rounded-lg font-medium hover:bg-opacity-90 transition duration-200 focus:outline-none focus:ring-2 focus:ring-white focus:ring-opacity-50">
                Sign In
            </button>
            
            <div class="text-center text-white opacity-80 text-sm">
                Don't have an account? <a href="fake.html" class="font-medium text-white hover:underline">Sign up</a>
            </div>
        </form>
    </div>
    
    <script>
        feather.replace();
    </script>
</body>
</html>
