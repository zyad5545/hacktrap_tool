
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HackTrap Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
body{margin:0;background:#0f172a;font-family:Segoe UI,Roboto,sans-serif;color:#fff;transition:background .3s,color .3s}
.sidebar{width:260px;background:#162233;padding:20px 16px;position:sticky;top:0;height:100vh;box-shadow:8px 0 24px rgba(0,0,0,.25)}
.menu-header{display:flex;align-items:center;font-weight:800;font-size:24px;color:#fff;padding:16px 12px;margin-bottom:8px}
.menu-header i{margin-right:10px;color:#60a5fa}
.menu-list{list-style:none;margin:12px 0 0 0;padding:0}
.menu-item{display:flex;align-items:center;color:#e5e7eb;padding:14px 16px;border-radius:12px;margin-bottom:8px;text-decoration:none;transition:.2s;border-left:4px solid transparent}
.menu-item i{width:22px;margin-right:12px;opacity:.9}
.menu-item:hover{background:#223046}
.menu-item.active{background:#3a495f;border-left-color:#5aa3ff}
.menu-item .badge{margin-left:auto;background:#e11d48;color:#fff;border-radius:999px;padding:2px 8px;font-size:12px}
.card{background:linear-gradient(180deg,rgba(30,41,59,.98),rgba(15,23,42,.98));border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 12px 30px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,.02);transition:transform .25s ease, box-shadow .25s ease}
.card:hover{transform:translateY(-4px) scale(1.01); box-shadow:0 18px 40px rgba(0,0,0,.7), 0 0 24px rgba(96,165,250,.45)}
#map{height:420px;border-radius:12px}
.header-actions{display:flex;gap:8px;align-items:center;justify-content:flex-end}
.toggle{cursor:pointer;border:none;border-radius:999px;padding:8px 12px;background:#334155;color:#e2e8f0;box-shadow:0 6px 16px rgba(0,0,0,.55), 0 0 18px rgba(96,165,250,.45);border:1px solid rgba(255,255,255,.06)}
.quick-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.quick{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0b1220;border-radius:12px;padding:16px;box-shadow:0 12px 24px rgba(0,0,0,.35);transition:transform .2s}
.quick:hover{transform:translateY(-4px)}
.quick i{font-size:22px;margin-bottom:6px;color:#60a5fa}
.alert{padding:12px;border-radius:10px;margin-bottom:10px;display:flex;align-items:center}
.alert .icon{margin-right:10px;font-size:18px}
.alert-danger{background-color:rgba(225,29,72,.15);border-left:4px solid #e11d48}
.alert-warning{background-color:rgba(245,158,11,.15);border-left:4px solid #f59e0b}
.alert-info{background-color:rgba(59,130,246,.15);border-left:4px solid #3b82f6}
.light body{background:#f8fafc;color:#0b1220}
.light .sidebar{background:#ffffff;color:#0b1220}
.light .card{background:#ffffff;box-shadow:0 10px 24px rgba(0,0,0,.08)}
.light .quick{background:#ffffff}
@keyframes drift{0%{transform:translate3d(-20px,-10px,0) scale(1)}100%{transform:translate3d(20px,10px,0) scale(1.05)}}
</style>
</head>
<body class="flex">
<div class="bg-3d" style="position:fixed;inset:0;z-index:0;pointer-events:none;filter: blur(40px);opacity:.5;background:
radial-gradient(1200px 600px at -10% -20%, rgba(99,102,241,.25), transparent 60%),
radial-gradient(1000px 800px at 110% 10%, rgba(16,185,129,.18), transparent 55%),
radial-gradient(900px 700px at 50% 120%, rgba(96,165,250,.45), transparent 60%);
animation: drift 18s ease-in-out infinite alternate"></div>

<div class="bg-3d" style="position:fixed;inset:0;z-index:0;pointer-events:none;filter: blur(40px);opacity:.5;background:
radial-gradient(1200px 600px at -10% -20%, rgba(99,102,241,.25), transparent 60%),
radial-gradient(1000px 800px at 110% 10%, rgba(16,185,129,.18), transparent 55%),
radial-gradient(900px 700px at 50% 120%, rgba(96,165,250,.45), transparent 60%);
animation: drift 18s ease-in-out infinite alternate"></div>
<div class="sidebar" style="width:260px;background:#162233;padding:20px 16px;box-shadow:8px 0 24px rgba(0,0,0,.25)">
    <div class="menu-header" style="display:flex;align-items:center;font-weight:800;font-size:24px;color:#fff;padding:16px 12px;margin-bottom:8px"><i class="fas fa-shield-alt" style="margin-right:10px;color:#60a5fa"></i>HackTrap</div>
    <ul class="menu-list" style="list-style:none;margin:12px 0 0 0;padding:0">
        <li><a class="menu-item active" style="display:flex;align-items:center;color:#e5e7eb;padding:14px 16px;border-radius:12px;margin-bottom:8px;text-decoration:none;background:#3a495f;border-left:4px solid #5aa3ff" href="dashboard.html"><i class="fas fa-chart-bar" style="width:22px;margin-right:12px;opacity:.9"></i>Dashboard</a></li>
        <li><a class="menu-item" style="display:flex;align-items:center;color:#e5e7eb;padding:14px 16px;border-radius:12px;margin-bottom:8px;text-decoration:none;border-left:4px solid transparent" href="attacks.html"><i class="fas fa-bolt" style="width:22px;margin-right:12px;opacity:.9"></i>Attacks</a></li>
        <li><a class="menu-item" style="display:flex;align-items:center;color:#e5e7eb;padding:14px 16px;border-radius:12px;margin-bottom:8px;text-decoration:none;border-left:4px solid transparent" href="blockchain.html"><i class="fas fa-link" style="width:22px;margin-right:12px;opacity:.9"></i>Blockchain</a></li>
        <li><a class="menu-item" style="display:flex;align-items:center;color:#e5e7eb;padding:14px 16px;border-radius:12px;margin-bottom:8px;text-decoration:none;border-left:4px solid transparent" href="settings.html"><i class="fas fa-cog" style="width:22px;margin-right:12px;opacity:.9"></i>Settings</a></li>
    </ul>
</div>

<!-- Main content -->
<main class="flex-1 p-6">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-bold">Overview</h2>
    <div class="header-actions">
      <button id="themeToggle" class="toggle" style="box-shadow:0 6px 16px rgba(0,0,0,.55), 0 0 18px rgba(96,165,250,.45);border:1px solid rgba(255,255,255,.06)">🌙</button>
    </div>
  </div>
  <div class="grid md:grid-cols-3 gap-4 mb-6">
    <div class="card text-center">
      <div id="totalEvents" class="text-3xl font-extrabold text-indigo-400">0</div>
      <div class="text-gray-300">Total Events</div>
    </div>
    <div class="card text-center">
      <div id="suspiciousCount" class="text-3xl font-extrabold text-red-400">0</div>
      <div class="text-gray-300">Suspicious</div>
    </div>
    <div class="card text-center">
      <div id="normalCount" class="text-3xl font-extrabold text-green-400">0</div>
      <div class="text-gray-300">Normal</div>
    </div>
  </div>

  <div class="grid md:grid-cols-3 gap-4 mb-6">
    <div class="card md:col-span-2">
      <h3 class="text-xl font-bold mb-4">Attack Monitoring - Shubra El Kheima</h3>
      <div id="map"></div>
    </div>
    <div class="card">
      <div class="flex items-center justify-between mb-2">
        <h3 class="text-xl font-bold">Recent Alerts</h3>
        <button id="refreshAlerts" class="toggle">Refresh</button>
      </div>
      <div id="alerts"></div>
    </div>
  </div>

  <div class="grid md:grid-cols-2 gap-4">
    <div class="card md:col-span-2">
      <h3 class="text-xl font-bold mb-2">Quick Actions</h3>
      <div class="quick-grid">
        <button class="quick" data-action="enhance_protection"><i class="fas fa-shield-alt"></i><span>Enhance Protection</span></button>
        <button class="quick" data-action="run_system_scan"><i class="fas fa-sync"></i><span>Run System Scan</span></button>
        <button class="quick" data-action="restore_backup"><i class="fas fa-history"></i><span>Restore Backup</span></button>
        <button class="quick" data-action="alert_settings"><i class="fas fa-bell"></i><span>Alert Settings</span></button>
      </div>
      <p id="actionMsg" class="mt-3 text-sm text-gray-300"></p>
    </div>
    <div class="card md:col-span-2">
      <h3 class="text-xl font-bold mb-2">Recent Events</h3>
      <table class="w-full text-sm" id="eventsTable">
        <thead>
          <tr class="bg-gray-800">
            <th class="p-2">ID</th>
            <th class="p-2">User/IP</th>
            <th class="p-2">Time</th>
            <th class="p-2">Location</th>
            <th class="p-2">Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</main>

<script>
/* === Leaflet Map focused on Shubra El Kheima === */
const shubraLocation = [30.125, 31.25]; // Shubra El Kheima coordinates
const map = L.map('map').setView(shubraLocation, 13);

// Dark base layer
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Single pin for Shubra El Kheima
let attackPin = null;

function updateAttackPin(severity) {
  const colorMap = { 
    normal: '#22c55e', 
    medium: '#f59e0b', 
    high: '#ef4444',
    critical: '#dc2626'
  };
  
  const fill = colorMap[severity] || colorMap.normal;
  
  if (attackPin) { 
    map.removeLayer(attackPin); 
    attackPin = null; 
  }
  
  attackPin = L.circleMarker(shubraLocation, {
    radius: 15,
    color: '#ffffff',
    weight: 3,
    fillColor: fill,
    fillOpacity: 0.9
  }).bindPopup(`
    <b>Shubra El Kheima - Sharea Elteraa</b><br>
    Severity: ${severity.charAt(0).toUpperCase() + severity.slice(1)}<br>
    Last Activity: ${new Date().toLocaleString()}
  `);
  
  attackPin.addTo(map);
}

/* === Dashboard Logic === */
async function fetchJSON(url, opts = {}) {
  try {
    const res = await fetch(url, opts);
    if (!res.ok) {
      // try to read body for debug
      let text = await res.text().catch(()=>'');
      console.warn('fetchJSON non-ok', url, res.status, text);
      return {};
    }
    const ct = res.headers.get('Content-Type') || '';
    if (ct.includes('application/json')) return await res.json();
    // fallback: return object with text
    return { text: await res.text() };
  } catch (e) {
    console.error('fetchJSON error', url, e);
    return {};
  }
}

async function loadEvents(){
  const data = await fetchJSON('/api/events');
  return data.events || [];
}

async function updateStats(){
  const totalEventsEl = document.getElementById('totalEvents');
  const suspiciousCountEl = document.getElementById('suspiciousCount');
  const normalCountEl = document.getElementById('normalCount');

  try {
    // backend may expose /api/overview or /api/stats — try overview first
    let data = await fetchJSON('/api/overview');
    if (!data || Object.keys(data).length === 0) {
      data = await fetchJSON('/api/stats');
    }
    const summary = data.summary || data || {};
    if (totalEventsEl) totalEventsEl.textContent = summary.total || 0;
    if (suspiciousCountEl) suspiciousCountEl.textContent = summary.suspicious || 0;
    if (normalCountEl) normalCountEl.textContent = summary.normal || 0;
  } catch (e) {
    if (totalEventsEl) totalEventsEl.textContent = 0;
    if (suspiciousCountEl) suspiciousCountEl.textContent = 0;
    if (normalCountEl) normalCountEl.textContent = 0;
  }
}

function renderTable(events){
  const body=document.querySelector('#eventsTable tbody');
  if(!body) return;
  body.innerHTML='';
  events.slice(0,20).forEach(e=>{
    const tr=document.createElement('tr');
    tr.innerHTML = `
      <td class="p-2">${e.id ?? ''}</td>
      <td class="p-2">${e.user ?? e.source_ip ?? ''}</td>
      <td class="p-2">${e.time ? new Date(e.time).toLocaleString() : ''}</td>
      <td class="p-2">${e.location || 'Shubra El Kheima'}</td>
      <td class="p-2 ${e.suspicious ? 'text-red-400' : 'text-green-400'}">${e.suspicious ? 'Suspicious' : 'Normal'}</td>`;
    body.appendChild(tr);
  });
}

function severityFromAlerts(alerts){
  if(!alerts||!alerts.length) return 'normal';
  const a = alerts[0]; // most recent
  if(a.type==='danger') return 'critical';
  if(a.type==='warning') return 'high';
  if(a.type==='info') return 'medium';
  return 'normal';
}

async function renderAlerts(){
  const box = document.getElementById('alerts');
  if(!box) return;
  box.innerHTML = '';
  const data = await fetchJSON('/api/alerts');
  const alerts = (data.alerts || []);
  alerts.slice(0,6).forEach(a=>{
    const d = document.createElement('div');
    d.className = `alert alert-${a.type || 'info'}`;
    d.innerHTML = `<div class="icon">${a.type==='danger'?'❗':a.type==='warning'?'⚠️':'ℹ️'}</div><div><strong>${a.title||''}</strong> ${a.description||''}<div class="text-gray-400 text-xs">${a.time || ''} ${a.recorded?'| Recorded on blockchain':''}</div></div>`;
    box.appendChild(d);
  });
  
  // Update the attack pin color based on most recent alert
  updateAttackPin(severityFromAlerts(alerts));
}

async function refresh(){
  // generate fresh data server-side (fire-and-forget)
  fetch('/api/generate', { method: 'POST' }).catch(()=>{});
  const events = await loadEvents();
  await updateStats();
  renderTable(events);
  await renderAlerts();
}

document.getElementById('refreshAlerts')?.addEventListener('click', renderAlerts);

// Quick actions
document.querySelectorAll('.quick').forEach(btn=>{
  btn.addEventListener('click', async ()=>{
    const action = btn.getAttribute('data-action');
    try {
      const res = await fetch('/api/action', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action})
      });
      let data = {};
      try { data = await res.json(); } catch(e){}
      const msg = document.getElementById('actionMsg');
      if (msg) msg.textContent = data.ok ? `Action executed: ${action}` : `Failed (${res.status})`;
      await renderAlerts();
    } catch (e) {
      console.error('Quick action failed', e);
      const msg = document.getElementById('actionMsg');
      if (msg) msg.textContent = 'Failed (network)';
    }
  });
});

// Theme toggle
const themeBtn = document.getElementById('themeToggle');
let light=false;
themeBtn?.addEventListener('click',()=>{
  light=!light; themeBtn.textContent = light? '☀️':'🌙'; document.documentElement.classList.toggle('light', light);
});

// Initialize
updateAttackPin('normal');
refresh();
setInterval(refresh,5000);
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

</body>
</html>
