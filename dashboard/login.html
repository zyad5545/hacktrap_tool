<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HackTrap | Secure Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
<style>
/* === original theme retained === */
body{background:#0f172a;font-family:Segoe UI,Roboto,sans-serif;}
.card{
  max-width:400px;margin:auto;margin-top:8%;
  background:#1e293b;padding:30px;border-radius:12px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
}
input{
  background:#334155;border:none;color:#fff;
  width:100%;padding:12px 14px;border-radius:8px;margin-top:6px;
}
input:focus{outline:none;box-shadow:0 0 0 2px #6366f1;}
button{
  background:#6366f1;color:#fff;width:100%;
  padding:12px;border-radius:8px;font-weight:600;transition:.2s;
}
button:hover{background:#4f46e5;}
label{color:#e2e8f0;font-weight:500;}
.error{color:#f87171;font-size:14px;margin-top:8px;display:none;}
</style>
</head>
<body>
<div class="card">
  <h1 class="text-center text-3xl text-white font-bold mb-6">HackTrap</h1>

  <form id="loginForm">
    <div class="mb-4">
      <label>Username</label>
      <input id="username" placeholder="Enter username">
    </div>
    <div class="mb-4">
      <label>Password</label>
      <input id="password" type="password" placeholder="Enter password">
    </div>
    <button type="submit">Sign In</button>
    <p id="errorMsg" class="error">Invalid credentials</p>
  </form>

  <!-- Keep the visible demo hint exactly as before -->
  <p class="text-center text-gray-300 text-sm mt-6">
    Demo Credentials:<br>
    <b>Username:</b> demo &nbsp; <b>Password:</b> demo123
  </p>
</div>

<script>
/* === two valid accounts === */
const ACCOUNTS = [
  {user:'demo', pass:'demo123'},         // visible demo account
  {user:'hack', pass:'hacktrap123'}      // hidden account (no hint shown)
];

/* Save event for dashboard */
function saveEvent(e){
  let list = JSON.parse(localStorage.getItem('hacktrap_events')||'[]');
  list.unshift(e);
  localStorage.setItem('hacktrap_events', JSON.stringify(list));
}

/* Login handling */
loginForm.addEventListener('submit', e=>{
  e.preventDefault();
  const u = username.value.trim();
  const p = password.value.trim();
  const err = errorMsg;
  err.style.display = 'none';

  if(!u || !p){
    err.textContent = "Please fill in all fields";
    err.style.display = 'block';
    return;
  }

  const match = ACCOUNTS.find(a => a.user === u && a.pass === p);

  const event = {
    id: 'evt-' + Date.now(),
    user: u,
    time: new Date().toISOString(),
    type: 'login_attempt',
    suspicious: !match,
    location: 'Shubra El Kheima - Sharea Elteraa'
  };
  saveEvent(event);

  // Send login event to backend
  fetch('http://localhost:5000/api/login_event',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(event)
  }).catch(()=>{}).finally(()=>{
    if(match){
      window.location.href = 'dashboard.html';
    } else {
      err.textContent = "Invalid credentials";
      err.style.display = 'block';
    }
  });
});
</script>
</body>
</html>
