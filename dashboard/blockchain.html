<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blockchain Logs - HackTrap</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{--accent:#60a5fa;--accent-glow:rgba(96,165,250,.45);}
    html.light{--accent:#f5c518;--accent-glow:rgba(245,197,24,.45);}
    :root {
      --secondary: #3498db;
      --success: #2ecc71;
      --warning: #f39c12;
    }

    * {box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
    body {background:#000;color:#fff;line-height:1.6;display:flex;min-height:100vh;transition:background .3s,color .3s;}

    .bg-3d{position:fixed;inset:0;z-index:0;pointer-events:none;filter: blur(40px);opacity:.55;
      background:radial-gradient(1200px 600px at -10% -20%, rgba(99,102,241,.25), transparent 60%),
                 radial-gradient(1000px 800px at 110% 10%, rgba(16,185,129,.18), transparent 55%),
                 radial-gradient(900px 700px at 50% 120%, var(--accent-glow), transparent 60%);
      animation:drift 18s ease-in-out infinite alternate;}
    @keyframes drift{0%{transform:translate3d(-20px,-10px,0) scale(1)}100%{transform:translate3d(20px,10px,0) scale(1.05)}}

    .sidebar{width:260px;background:#162233;color:#fff;padding:20px 16px;height:100vh;position:fixed;overflow-y:auto;box-shadow:8px 0 24px rgba(0,0,0,.25)}
    .menu-header{display:flex;align-items:center;font-weight:800;font-size:24px;color:#fff;padding:16px 12px;margin-bottom:8px}
    .menu-item{display:flex;align-items:center;color:#e5e7eb;padding:14px 16px;border-radius:12px;margin-bottom:8px;text-decoration:none;border-left:4px solid transparent;transition:.2s}
    .menu-item:hover{background:rgba(255,255,255,.1);border-left:4px solid var(--secondary)}
    .menu-item.active{background:#3a495f;border-left:4px solid #5aa3ff}
    .menu-item i{width:22px;margin-right:12px;opacity:.9}

    .main-content{flex:1;margin-left:260px;padding:20px}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;
      background:linear-gradient(180deg,rgba(30,41,59,.98),rgba(15,23,42,.98));padding:15px 20px;border-radius:12px;
      box-shadow:0 12px 30px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.03),0 0 24px var(--accent-glow) inset;}

    .status-dot{width:12px;height:12px;background:var(--success);border-radius:50%;margin-right:10px}

    .card{background:linear-gradient(180deg,rgba(30,41,59,.98),rgba(15,23,42,.98));border-radius:16px;padding:20px;margin-bottom:20px;
      box-shadow:0 12px 30px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.02);transition:.25s}
    .card:hover{transform:translateY(-3px);box-shadow:0 18px 40px rgba(0,0,0,.7),0 0 24px var(--accent-glow)}

    table{width:100%;border-collapse:collapse}
    th,td{padding:12px;text-align:left;border-bottom:1px solid #334155}
    th{background:#0b1220;color:#cbd5e1}

    .badge{padding:4px 8px;border-radius:20px;font-size:.8rem}
    .badge-success{background:var(--success);color:#fff}

    .toggle{cursor:pointer;border:none;border-radius:999px;padding:10px 14px;background:#0b1220;color:#e2e8f0;
      box-shadow:0 6px 16px rgba(0,0,0,.55),0 0 18px var(--accent-glow);border:1px solid rgba(255,255,255,.06)}
  </style>
</head>
<body>
  <div class="bg-3d"></div>
  <div class="sidebar">
    <div class="menu-header"><i class="fas fa-shield-alt" style="margin-right:10px;color:#60a5fa"></i>HackTrap</div>
    <ul style="list-style:none;padding:0">
      <li><a class="menu-item" href="dashboard.html"><i class="fas fa-chart-bar"></i>Dashboard</a></li>
      <li><a class="menu-item" href="attacks.html"><i class="fas fa-bolt"></i>Attacks</a></li>
      <li><a class="menu-item active" href="blockchain.html"><i class="fas fa-link"></i>Blockchain</a></li>
      <li><a class="menu-item" href="settings.html"><i class="fas fa-cog"></i>Settings</a></li>
    </ul>
  </div>

  <div class="main-content">
    <div class="header">
      <h1>Blockchain Transaction Logs</h1>
      <div style="display:flex;gap:12px;align-items:center">
        <div style="display:flex;align-items:center">
          <div class="status-dot"></div><span>Connected</span>
        </div>
        <button id="themeToggle" class="toggle">🌙</button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-weight:600">Recent Blockchain Transactions</div>
        <button class="toggle" onclick="loadTxs()"><i class="fas fa-sync"></i>&nbsp;Refresh</button>
      </div>
      <table>
        <thead><tr><th>Tx Hash</th><th>Attack</th><th>Source IP</th><th>Location</th><th>Time</th></tr></thead>
        <tbody id="tx-body"><tr><td colspan="5">Loading...</td></tr></tbody>
      </table>
    </div>

    <div class="card">
      <div style="font-weight:600;margin-bottom:12px">Blockchain Records (Last 5)</div>
      <table>
        <thead><tr><th>ID</th><th>Type</th><th>Location</th><th>Time</th><th>Status</th></tr></thead>
        <tbody id="bc-last"><tr><td colspan="5">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

<script>
async function loadTxs(){
  try{
    const resp = await fetch("/api/attacks");
    if(!resp.ok) throw new Error("HTTP "+resp.status);
    const data = await resp.json();
    const attacks = (data.attacks||[]).filter(a=>a.blockchain_tx_hash);
    const tbody=document.getElementById("tx-body");
    if(!attacks.length){tbody.innerHTML="<tr><td colspan=5>No anchored events</td></tr>";return;}
    tbody.innerHTML=attacks.slice(0,50).map(a=>{
      return `<tr>
        <td><code>${a.blockchain_tx_hash}</code></td>
        <td>${a.attack_type||""}</td>
        <td>${a.source_ip||""}</td>
        <td>${a.location||"Unknown"}</td>
        <td>${a.timestamp||""}</td>
      </tr>`}).join("");
  }catch(e){
    console.error(e);
    document.getElementById("tx-body").innerHTML="<tr><td colspan=5 style='color:red'>Load failed</td></tr>";
  }
}

async function loadRecords(){
  try{
    const resp=await fetch("/api/blockchain");
    if(!resp.ok) throw new Error("HTTP "+resp.status);
    const data=await resp.json();
    const tbody=document.getElementById("bc-last");
    const recs=data.records||[];
    if(!recs.length){tbody.innerHTML="<tr><td colspan=5>No records</td></tr>";return;}
    tbody.innerHTML=recs.slice(0,5).map(r=>{
      return `<tr>
        <td>#${r.id||""}</td>
        <td>${r.type||""}</td>
        <td>${r.location||"Unknown"}</td>
        <td>${r.time||""}</td>
        <td><span class="badge badge-success">${r.status||"ok"}</span></td>
      </tr>`}).join("");
  }catch(e){
    console.error(e);
    document.getElementById("bc-last").innerHTML="<tr><td colspan=5 style='color:red'>Load failed</td></tr>";
  }
}

document.getElementById("themeToggle").addEventListener("click",()=>{
  document.documentElement.classList.toggle("light");
});

loadTxs();
loadRecords();
setInterval(loadTxs,15000);
setInterval(loadRecords,20000);
</script>
</body>
</html>
