# dashboard/nginx.conf — tuned for HackTrap dashboard
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index dashboard.html;

    # Security headers
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=63072000; includeSubdomains" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Serve SPA / static UI
    location / {
        try_files $uri $uri/ /dashboard.html;
    }

    # Explicit static pages (to avoid accidental proxy)
    location = /original_search.html   { try_files /original_search.html =404; }
    location = /fake_search.html       { try_files /fake_search.html =404; }
    location = /attacks                { try_files /attacks.html =404; }
    location = /blockchain             { try_files /blockchain.html =404; }
    location = /settings               { try_files /settings.html =404; }
    location = /original_login.html    { try_files /original_login.html =404; }
    location = /login.html             { try_files /login.html =404; }

    # Proxy API endpoints -> backend
    location ^~ /api/ {
        proxy_pass http://hacktrap_backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-API-KEY "honeypot-secure-key";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 90;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
    }

    # Proxy login and search explicitly (backend returns HTML sometimes)
    location = /login {
        proxy_pass http://hacktrap_backend:8000/login;
        proxy_set_header X-API-KEY "honeypot-secure-key";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 90;
    }

    location = /search {
        proxy_pass http://hacktrap_backend:8000/search;
        proxy_set_header X-API-KEY "honeypot-secure-key";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 90;
    }

    # Proxy AI generate endpoints (if front-end hits AI directly)
    location /api/generate {
        proxy_pass http://hacktrap_ai_engine:5000/api/generate;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 90;
    }

    # Proxy honeypot submit explicitly so fake honeypot page POSTs are handled
    location = /honeypot/submit {
        proxy_pass http://hacktrap_backend:8000/honeypot/submit;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-API-KEY "honeypot-secure-key"; # harmless if present
        proxy_read_timeout 90;
    }

    location ^~ /honeypot/ {
        proxy_pass http://hacktrap_backend:8000/honeypot/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-API-KEY "honeypot-secure-key";
        proxy_read_timeout 90;
    }

    # Health check
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "healthy\n";
    }

    client_max_body_size 10M;
}
