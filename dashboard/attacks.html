<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HackTrap - Detected Attacks</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fa; }
    .sidebar { width: 220px; background: #2c3e50; color: #fff; height: 100vh; position: fixed; padding: 20px; }
    .sidebar .logo { font-size: 20px; margin-bottom: 30px; }
    .sidebar .menu-item { margin: 15px 0; cursor: pointer; }
    .sidebar .menu-item i { margin-right: 8px; }
    .main-content { margin-left: 220px; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .card { background: #fff; padding: 20px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .attack-details { padding: 15px; margin-bottom: 15px; border-radius: 5px; }
    .attack-severity-critical { border-left: 4px solid #e74c3c; background: #fceaea; }
    .attack-severity-high { border-left: 4px solid #f39c12; background: #fff4e5; }
    .attack-severity-medium { border-left: 4px solid #3498db; background: #eaf4fc; }
    .attack-severity-low { border-left: 4px solid #2ecc71; background: #eafaf1; }
    .badge { padding: 3px 8px; border-radius: 12px; font-size: 0.8rem; color: #fff; }
    .badge-critical { background: #e74c3c; }
    .badge-high { background: #f39c12; }
    .badge-medium { background: #3498db; }
    .badge-low { background: #2ecc71; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
    th { background: #f0f0f0; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo"><i class="fas fa-shield-alt"></i> HackTrap</div>
    <div class="menu-item" onclick="window.location.href='dashboard.html'"><i class="fas fa-chart-bar"></i> Dashboard</div>
    <div class="menu-item active" onclick="window.location.href='attacks.html'"><i class="fas fa-bolt"></i> Attacks</div>
    <div class="menu-item" onclick="window.location.href='blockchain.html'"><i class="fas fa-link"></i> Blockchain</div>
    <div class="menu-item" onclick="window.location.href='settings.html'"><i class="fas fa-cog"></i> Settings</div>
  </div>

  <div class="main-content">
    <div class="header">
      <h1>Detected Attacks</h1>
      <span id="status">🔄 Loading...</span>
    </div>

    <div class="card">
      <h2>Recent Attack Attempts</h2>
      <div id="attacks-list">Loading...</div>
    </div>

    <div class="card">
      <h2>Attack Stats</h2>
      <canvas id="attackChart"></canvas>
    </div>
  </div>

  <script>
    async function loadAttacks() {
      try {
        const res = await fetch("/api/attacks", {
          headers: { "X-API-KEY": "demo-key" }
        });
        const data = await res.json();

        const container = document.getElementById("attacks-list");
        container.innerHTML = "";

        if (!data.attacks || data.attacks.length === 0) {
          container.innerHTML = "<p>No attacks recorded yet.</p>";
          return;
        }

        let counts = { brute_force: 0, ddos: 0, phishing: 0, other: 0 };

        data.attacks.forEach(attack => {
          const severityClass = "attack-severity-" + attack.severity.toLowerCase();
          const badgeClass = "badge-" + attack.severity.toLowerCase();

          const div = document.createElement("div");
          div.className = `attack-details ${severityClass}`;
          div.innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <h3>${attack.attack_type}</h3>
              <span class="badge ${badgeClass}">${attack.severity}</span>
            </div>
            <p>${attack.details || "No details"}</p>
            <table>
              <tr><th>Source IP</th><td>${attack.source_ip}</td></tr>
              <tr><th>Time</th><td>${attack.timestamp}</td></tr>
              <tr><th>Target</th><td>${attack.target_resource || "-"}</td></tr>
            </table>
          `;
          container.appendChild(div);

          // Count stats
          if (counts[attack.attack_type.toLowerCase()] !== undefined) {
            counts[attack.attack_type.toLowerCase()]++;
          } else {
            counts.other++;
          }
        });

        // Update chart
        updateChart(counts);
        document.getElementById("status").textContent = "✅ Monitoring Active";

      } catch (err) {
        console.error("Error:", err);
        document.getElementById("attacks-list").innerHTML = "<p style='color:red'>Failed to load attacks.</p>";
        document.getElementById("status").textContent = "❌ Error";
      }
    }

    let chart;
    function updateChart(counts) {
      const ctx = document.getElementById("attackChart").getContext("2d");
      if (chart) chart.destroy();
      chart = new Chart(ctx, {
        type: "doughnut",
        data: {
          labels: ["Brute Force", "DDoS", "Phishing", "Other"],
          datasets: [{
            data: [counts.brute_force, counts.ddos, counts.phishing, counts.other],
            backgroundColor: ["#e74c3c", "#f39c12", "#3498db", "#95a5a6"]
          }]
        }
      });
    }

    // Load data on page load
    loadAttacks();

    // Refresh every 10s
    setInterval(loadAttacks, 10000);
  </script>
</body>
</html>
