<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>SSH Honeypot Access</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);font-family:Inter,ui-sans-serif,system-ui;}
    .card{max-width:720px;margin:6% auto;padding:28px;background:rgba(255,255,255,0.06);border-radius:12px;color:#fff}
    a.btn{background:#fff;color:#4f46e5;padding:10px 14px;border-radius:8px;font-weight:600;display:inline-block}
  </style>
</head>
<body>
  <div class="card">
    <h1 class="text-2xl font-bold mb-2">SSH Honeypot</h1>
    <p class="mb-4">لقد تم تحويلك إلى بيئة الصيد (honeypot) — إذا أردت يمكنك محاولة الاتصال بجلسة SSH لمعرفة السلوك.</p>
    <div id="links"></div>
    <p class="mt-6">ملاحظة: بعض المتصفحات لا تدعم فتح روابط <code>ssh://</code> تلقائياً. إذا لم يُفتح التطبيق، انسخ الرابط الى الطرفية (terminal) لديك وادخل:</p>
    <pre id="manual" style="background:rgba(0,0,0,0.25);padding:10px;border-radius:6px;margin-top:8px"></pre>
  </div>

<script>
  // read host from query param
  function getParam(name){
    name=name.replace(/[[]/,"\\[").replace(/[\]]/,"\\]");
    var regex=new RegExp("[\\?&]"+name+"=([^&#]*)");
    var results=regex.exec(location.search);
    return results===null?"":decodeURIComponent(results[1].replace(/\+/g," "));
  }
  const host = getParam('host') || window.location.hostname;
  const ssh = `ssh://` + host + `:2222`;
  document.getElementById('links').innerHTML = `<a class="btn" href="${ssh}">Open SSH client (ssh://)</a> <a class="btn" style="background:rgba(255,255,255,0.12);margin-left:8px" href="#" onclick="copy()">Copy to clipboard</a>`;
  document.getElementById('manual').textContent = `ssh -p 2222 user@${host}`;
  function copy(){
    navigator.clipboard && navigator.clipboard.writeText(`ssh -p 2222 user@${host}`).then(()=>alert('Copied to clipboard'));
  }
  // attempt to auto-open ssh:// URI once (may be blocked by browser)
  setTimeout(()=>{ try { window.location.href = ssh; } catch(e){} }, 250);
</script>
</body>
</html>
