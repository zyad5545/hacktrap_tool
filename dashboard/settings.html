<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HackTrap Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body{margin:0;font-family:'Segoe UI',sans-serif;background:#000;color:#fff;display:flex;min-height:100vh}
    .sidebar{width:260px;background:#162233;color:#fff;padding:20px 16px;height:100vh;position:fixed;box-shadow:8px 0 24px rgba(0,0,0,.25)}
    .menu-header{display:flex;align-items:center;font-weight:800;font-size:24px;color:#fff;padding:16px 12px;margin-bottom:8px}
    .menu-item{display:flex;align-items:center;color:#e5e7eb;padding:14px 16px;border-radius:12px;margin-bottom:8px;text-decoration:none;border-left:4px solid transparent}
    .menu-item.active{background:#3a495f;border-left:4px solid #5aa3ff}
    .main-content{flex:1;margin-left:260px;padding:20px}
    .card{background:linear-gradient(180deg,rgba(30,41,59,.98),rgba(15,23,42,.98));border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 12px 30px rgba(0,0,0,.55)}
    label{display:block;margin-top:12px;font-size:14px}
    input{padding:8px;border-radius:6px;border:1px solid #334155;background:#0f172a;color:#fff;width:280px;margin-top:4px}
    .btn{margin-top:14px;background:#3498db;color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer}
    .btn:hover{background:#2980b9}
    .danger{background:#e74c3c}
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="menu-header"><i class="fas fa-shield-alt" style="margin-right:10px;color:#60a5fa"></i>HackTrap</div>
    <ul style="list-style:none;padding:0">
      <li><a class="menu-item" href="dashboard.html"><i class="fas fa-chart-bar"></i>Dashboard</a></li>
      <li><a class="menu-item" href="attacks.html"><i class="fas fa-bolt"></i>Attacks</a></li>
      <li><a class="menu-item" href="blockchain.html"><i class="fas fa-link"></i>Blockchain</a></li>
      <li><a class="menu-item active" href="settings.html"><i class="fas fa-cog"></i>Settings</a></li>
    </ul>
  </div>

  <div class="main-content">
    <h1>Settings</h1>

    <div class="card">
      <h2>System Configuration</h2>
      <label>API Key <input type="text" id="apiKey" placeholder="honeypot-secure-key" /></label>
      <label>Timeout (seconds) <input type="number" id="timeout" value="6" /></label>
      <button class="btn" id="saveBtn"><i class="fas fa-save"></i> Save</button>
    </div>

    <div class="card">
      <h2>Maintenance</h2>
      <p>You can clear logs (attacks + honeypot + blockchain)</p>
      <button class="btn danger" id="clearLogsBtn"><i class="fas fa-trash"></i> Clear Logs</button>
    </div>
  </div>

<script>
document.getElementById("saveBtn").addEventListener("click",()=>{
  localStorage.setItem("hacktrap_api_key",document.getElementById("apiKey").value);
  localStorage.setItem("hacktrap_timeout",document.getElementById("timeout").value);
  alert("Settings saved locally!");
});
document.getElementById("clearLogsBtn").addEventListener("click",async()=>{
  if(!confirm("Clear ALL logs?")) return;
  const res=await fetch("/api/clear_logs",{method:"POST"});
  if(res.ok) alert("Logs cleared"); else alert("Failed to clear logs");
});
</script>
</body>
</html>
