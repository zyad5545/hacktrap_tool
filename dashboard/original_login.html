<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HackTrap | Secure Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
<style>
  body{background:#0f172a;font-family:Segoe UI,Roboto,sans-serif;}
  .card{max-width:400px;margin:auto;margin-top:6%;background:#1e293b;padding:30px;border-radius:12px;box-shadow:0 0 20px rgba(0,0,0,0.4);}
  input{background:#334155;border:none;color:#fff;width:100%;padding:12px 14px;border-radius:8px;margin-top:6px;}
  input:focus{outline:none;box-shadow:0 0 0 2px #6366f1;}
  button{background:#6366f1;color:#fff;width:100%;padding:12px;border-radius:8px;font-weight:600;transition:.2s;}
  button:hover{background:#4f46e5;}
  label{color:#e2e8f0;font-weight:500;}
  .error{color:#f87171;font-size:14px;margin-top:8px;display:none;}
  .success{color:#34d399;font-size:14px;margin-top:8px;display:none;}
</style>
</head>
<body>
  <div class="card">
    <h1 class="text-center text-3xl text-white font-bold mb-6">HackTrap</h1>

    <form id="loginForm">
      <div class="mb-4">
        <label>Username</label>
        <input id="username" name="username" placeholder="Enter username" autocomplete="off">
      </div>
      <div class="mb-4">
        <label>Password</label>
        <input id="password" name="password" type="password" placeholder="Enter password" autocomplete="off">
      </div>
      <button type="submit">Sign In</button>
      <p id="errorMsg" class="error">Invalid credentials</p>
      <p id="successMsg" class="success"></p>
    </form>

    <p class="text-center text-gray-300 text-sm mt-6">
      <br>
    </p>
  </div>

<script>
  const BACKEND_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://localhost:8000' : '';

  const loginForm = document.getElementById('loginForm');
  const username = document.getElementById('username');
  const password = document.getElementById('password');
  const err = document.getElementById('errorMsg');
  const success = document.getElementById('successMsg');

  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.style.display = 'none';
    success.style.display = 'none';

    const u = username.value.trim();
    const p = password.value.trim();
    if (!u || !p) {
      err.textContent = "يرجى تعبئة الحقول";
      err.style.display = 'block';
      return;
    }

    try {
      const url = (BACKEND_BASE || '') + '/login';
      const res = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({username: u, password: p})
      });

      let data = null;
      try { data = await res.json(); } catch (e) { data = null; }

      // If backend instructs redirect to honeypot (ssh or fallback), follow it (do not show banner)
      if (data && data.redirect) {
        const redirectUrl = data.redirect.startsWith('http') ? data.redirect : ((BACKEND_BASE ? BACKEND_BASE + data.redirect : data.redirect));
        window.location.href = redirectUrl;
        return;
      }

      if (res.ok && data && data.success) {
        success.textContent = data.message || "تم تسجيل الدخول";
        success.style.display = 'block';
        return;
      }

      err.textContent = (data && data.message) ? data.message : ("Server error: " + res.status);
      err.style.display = 'block';
    } catch (ex) {
      err.textContent = "حدث خطأ في الاتصال بالخادم: " + (ex.message || ex);
      err.style.display = 'block';
    }
  });
</script>
</body>
</html>
